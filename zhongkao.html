<script>
// ==================== 知识库：完全内嵌 ====================
var SCHOOLS = [
  {n:"杭二滨江",t:1,tn:"第一梯队-前三所",s:630,b:"是",d:"滨江区",g:"杭二中教育集团",a:"滨江区东信大道76号",m:"地铁4号线联庄站",note:"TOP1重高，清北/浙大录取数领跑"},
  {n:"学军西溪",t:1,tn:"第一梯队-前三所",s:629,b:"部分",d:"西湖区",g:"学军教育集团",a:"西湖区文三路188号",m:"地铁2号线学院路站",note:"与杭二并列顶尖"},
  {n:"杭高贡院",t:1,tn:"第一梯队-前三所",s:627,b:"是",d:"拱墅区",g:"杭高教育集团",a:"拱墅区凤起路238号",m:"地铁1/2号线凤起路站",note:"传统名校"},
  {n:"杭十四凤起",t:2,tn:"第二梯队-重高",s:624,b:"部分",d:"拱墅区",g:"杭十四教育集团",a:"拱墅区凤起路580号",m:"地铁1/2号线凤起路站"},
  {n:"学军紫金港",t:2,tn:"第二梯队-重高",s:623,b:"是",d:"西湖区",g:"学军教育集团",a:"西湖区萍水西街100号",m:"地铁2号线三坝站",note:"2025首进前八"},
  {n:"杭四下沙",t:2,tn:"第二梯队-重高",s:622,b:"是",d:"钱塘区",g:"杭四中教育集团",a:"钱塘区下沙6号大街436号",m:"地铁1号线文海南路站"},
  {n:"浙大玉泉",t:2,tn:"第二梯队-重高",s:620,b:"否",d:"西湖区",g:"浙大附中教育集团",a:"西湖区曙光路89号",m:"地铁1号线西湖文化广场站"},
  {n:"长河高中",t:2,tn:"第二梯队-重高",s:619,b:"是",d:"滨江区",g:"",a:"滨江区滨文路227号",m:"地铁5号线聚才路站"},
  {n:"杭师大附中",t:3,tn:"第三梯队-优高",s:617,b:"是",d:"西湖区",g:"",a:"西湖区振华路5号",m:"地铁2号线墩祥街站"},
  {n:"杭高钱江",t:3,tn:"第三梯队-优高",s:617,b:"是",d:"钱塘区",g:"杭高教育集团"},
  {n:"杭十四康桥",t:3,tn:"第三梯队-优高",s:612,b:"是",d:"拱墅区",g:"杭十四教育集团",a:"拱墅区龙腾街500号",m:"地铁4号线储运路站"},
  {n:"浙大丁兰",t:3,tn:"第三梯队-优高",s:610,b:"是",d:"上城区",g:"浙大附中教育集团",a:"上城区丁兰街道丁兰路999号"},
  {n:"源清中学",t:3,tn:"第三梯队-优高",s:607,b:"是",d:"拱墅区",g:"",a:"拱墅区湖州街69号",m:"地铁5号线善贤站"},
  {n:"杭二东河",t:3,tn:"第三梯队-优高",s:602,b:"否",d:"上城区",g:"杭二中教育集团",a:"上城区建国中路36号",m:"地铁5号线万安桥站",note:"有首创班"},
  {n:"杭四吴山",t:3,tn:"第三梯队-优高",s:595,b:"否",d:"上城区",g:"杭四中教育集团",a:"上城区吴山路128号",m:"地铁1号线定安路站"},
  {n:"杭七中转塘",t:3,tn:"第三梯队-优高",s:590,b:"是",d:"西湖区"},
  // 2026新校（预测分）
  {n:"杭二高新(新)",t:3,tn:"2026新增",s:600,b:"是",d:"",g:"杭二中教育集团",note:"杭二中教育集团新校区，招18班"},
  {n:"浙大附实验(新)",t:3,tn:"2026新增",s:595,b:"是",d:"",g:"浙大附中教育集团",note:"招14班"},
  {n:"淳安中学(新)",t:3,tn:"2026县中",s:570,b:"是",d:"淳安县",note:"首次面向主城区招生"},
];

var PRED = {
  yd:567, ydL:563, ydH:572,  // 一段线
  zg:622, zgL:618, zgH:626,  // 重高线
  q3:632, q3L:628, q3H:636,  // 前三线
  yg:610, ygL:606, ygH:614   // 优高线
};

// ==================== 核心计算函数 ====================
function computeAll(data) {
  var sc = data.studentCount || 400;
  var totalQ = Math.round(sc * 0.205);
  var top3Q = Math.round(sc * 0.034);
  var top8Q = Math.round(sc * 0.09);
  var bestScore = data.mock2Score || data.mock1Score;
  var bestRank = data.mock2Rank || data.mock1Rank;
  var trend = data.mock1Score && data.mock2Score ? (data.mock2Score - data.mock1Score).toFixed(1) : null;

  // 筛选学校（按冲稳保）
  var allocSchools = []; // 分配生用
  var nkSchools = [];    // 裸考用

  SCHOOLS.forEach(function(s){
    if(!s.s) return;
    var diff = bestScore - s.s;
    var type = diff >= -15 && diff < -3 ? '冲' : (diff >= -3 && diff <= 3 ? '稳' : (diff < -15 ? '冲(难)' : '保'));
    // 精确判断
    if(diff >= -5 && diff <= 5) type = '稳';
    else if(diff > 5) type = '保';
    else if(diff < -5 && diff >= -15) type = '冲';
    else if(diff < -15) type = '冲(高难度)';

    // 住校过滤
    if(data.boarding==='希望住校' && s.b==='否') return;
    if(data.boarding==='希望走读' && !s.b) {} // 走读偏好，不住校的学校加分

    var entry = {
      n:s.n, t:s.t, tn:s.tn, s:s.s, b:s.b, d:s.d, g:s.g, a:s.a||'', m:s.m||'', note:s.note||'',
      diff:diff.toFixed(0), type:type
    };
    nkSchools.push(entry);
    if(type!=='冲(高难度)') allocSchools.push(entry);
  });

  // 排序：按分数降序
  var byScore = function(a,b){return b.s - a.s;};
  nkSchools.sort(byScore);
  allocSchools.sort(byScore);

  // 分配生志愿（前5所，冲冲稳稳保）
  var allocPlan = pickAllocation(allocSchools, bestRank, totalQ, top3Q, top8Q);

  // 裸考志愿（前10所，3冲4稳3保）
  var nkPlan = pickNakedExam(nkSchools);

  return {
    totalQ:totalQ, top3Q:top3Q, top8Q:top8Q,
    bestScore:bestScore, bestRank:bestRank, trend:trend,
    allocPlan:allocPlan, nkPlan:nkPlan,
    allSchools:nkSchools
  };
}

function pickAllocation(schools, bestRank, totalQ, top3Q, top8Q) {
  // 分配生策略：冲冲稳稳保（5个）
  var plan = [];
  var chong=[], wen=[], bao=[];
  schools.forEach(function(s){
    if(s.type==='冲'||s.type==='冲(高难度)') chong.push(s);
    else if(s.type==='稳') wen.push(s);
    else bao.push(s);
  });
  // 取2冲+2稳+1保
  plan.push({i:1, type:'冲', schools:chong.slice(0,3)});
  plan.push({i:2, type:'冲', schools:chong.slice(3,5)});
  plan.push({i:3, type:'稳', schools:wen.slice(0,3)});
  plan.push({i:4, type:'稳', schools:wen.slice(3,5)});
  plan.push({i:5, type:'保', schools:bao.slice(0,3)});
  return {slots:plan, totalQ:totalQ, top3Q:top3Q, top8Q:top8Q};
}

function pickNakedExam(schools) {
  var plan = [];
  for(var i=0;i<Math.min(10,schools.length);i++){
    var s = schools[i];
    var type = '保';
    if(i<3) type='冲'; else if(i<7) type='稳';
    plan.push({i:i+1, type:type, s:s});
  }
  return plan;
}

// ==================== 渲染报告 ====================
function renderReport(data, calc, aiText) {
  var sName = data.schoolName;
  var nick = data.nickname || '考生';
  var html = '';

  document.getElementById('reportTitle').textContent = nick + ' — ' + sName + ' 中考志愿填报方案';

  // 一、基本信息
  html += '<h3>一、考生基本信息</h3>';
  html += '<table class="info-table">';
  html += '<tr><td>初中学校</td><td><strong>'+sName+'</strong></td></tr>';
  if(data.studentCount) html += '<tr><td>学籍人数</td><td>'+data.studentCount+'人</td></tr>';
  html += '<tr><td>分配生资格</td><td>待评估（应届毕业生，需综合素质3A）</td></tr>';
  if(data.mock1Score) html += '<tr><td>一模成绩</td><td>'+data.mock1Score+'分'+(data.mock1Rank?' (年排第'+data.mock1Rank+'名)':'')+'</td></tr>';
  if(data.mock2Score) html += '<tr><td>二模成绩</td><td>'+data.mock2Score+'分'+(data.mock2Rank?' (年排第'+data.mock2Rank+'名)':'')+'</td></tr>';
  if(calc.trend) html += '<tr><td>模考趋势</td><td>'+(calc.trend>0?'📈 上涨'+calc.trend+'分':calc.trend<0?'📉 下降'+Math.abs(calc.trend)+'分':'➡ 持平')+'</td></tr>';
  html += '<tr><td>预估中考分</td><td><strong>'+(calc.bestScore+20)+'~'+(calc.bestScore+35)+'分</strong>（模考分+20~35修正）</td></tr>';
  html += '<tr><td>住校偏好</td><td>'+data.boarding+'</td></tr>';
  if(data.homeAddress) html += '<tr><td>家庭地址</td><td>'+data.homeAddress+'</td></tr>';
  if(data.targets) html += '<tr><td>目标/偏好</td><td>'+data.targets+'</td></tr>';
  html += '</table>';

  // 二、成绩定位
  html += '<h3>二、成绩定位与趋势分析</h3>';
  html += '<div class="analysis-box">';
  var estScore = calc.bestScore + 28; // 中值
  html += '<p>📊 <strong>二模成绩 '+calc.bestScore+'分</strong>，预估中考约 '+(calc.bestScore+20)+'~'+(calc.bestScore+35)+'分。</p>';
  html += '<p>📏 与2026预测线对比：一段线<strong>'+PRED.yd+'分</strong>（'+(estScore>PRED.yd?'✅ 超出'+(estScore-PRED.yd).toFixed(0)+'分':'❌ 低于'+((PRED.yd-estScore).toFixed(0))+'分')+'）· 重高线<strong>'+PRED.zg+'分</strong>（'+(estScore>PRED.zg?'✅ 超出'+(estScore-PRED.zg).toFixed(0)+'分':'⚠ 低于'+(PRED.zg-estScore).toFixed(0)+'分')+'）· 前三线<strong>'+PRED.q3+'分</strong></p>';
  if(calc.trend) html += '<p>'+'📈 一模→二模'+(calc.trend>0?'上涨':'下降')+Math.abs(calc.trend)+'分，趋势'+(calc.trend>0?'向好':'需关注')+'。</p>';
  html += '</div>';

  // 三、分配生
  html += '<h3>三、分配生资格评估</h3>';
  html += '<div class="analysis-box">';
  html += '<p>🎯 基于学籍<strong>'+(data.studentCount||'未填')+'人</strong>计算（×20.5%）：总分配生约<strong>'+calc.totalQ+'名</strong></p>';
  html += '<p>📌 前三所分配生约<strong>'+calc.top3Q+'名</strong>（×3.4%）· 前八所约<strong>'+calc.top8Q+'名</strong>（×9%）</p>';
  if(calc.bestRank){
    var allocProb = calc.bestRank <= calc.totalQ ? '高' : (calc.bestRank <= calc.totalQ*1.3 ? '中' : '低');
    var top3Prob = calc.bestRank <= calc.top3Q ? '高' : (calc.bestRank <= calc.top3Q*2 ? '中' : '低');
    html += '<p>👤 当前二模年排<strong>第'+calc.bestRank+'名</strong> → 获分配生概率：<span class="tag tag-'+(allocProb==='高'?'high':allocProb==='中'?'mid':'low')+'">'+allocProb+'</span> · 获前三分配生概率：<span class="tag tag-'+(top3Prob==='高'?'high':top3Prob==='中'?'mid':'low')+'">'+top3Prob+'</span></p>';
  }
  html += '</div>';

  // 分配生志愿表
  html += '<h4 style="color:#475569;margin:16px 0 8px">📋 分配生志愿（5个平行志愿，校内竞争）</h4>';
  html += '<table class="school-table"><tr><th>序号</th><th>类型</th><th>推荐学校</th><th>2025录取分</th><th>梯队</th><th>住校</th><th>匹配分析</th></tr>';
  var slotIdx = 0;
  for(var i=0;i<5;i++){
    var slot = calc.allocPlan.slots[i];
    if(slot.schools.length===0) continue;
    var s = slot.schools[0];
    var typeClass = slot.type==='冲'?'tag-chong':slot.type==='稳'?'tag-wen':'tag-bao';
    html += '<tr><td>'+(i+1)+'</td><td><span class="tag '+typeClass+'">'+slot.type+'</span></td>';
    html += '<td><strong>'+s.n+'</strong>'+(s.note?'<br><small style="color:#64748b">'+s.note+'</small>':'')+'</td>';
    html += '<td>'+s.s+'分</td><td>'+s.tn+'</td><td>'+s.b+'</td>';
    html += '<td style="text-align:left;font-size:0.85em">分差'+(s.diff>0?'+':'')+s.diff+'分'+(s.d||'')+'</td></tr>';
  }
  html += '</table>';

  // 四、裸考方案
  html += '<h3>四、裸考志愿方案（第一批10个，全市竞争）</h3>';
  html += '<p style="color:#64748b;font-size:0.85em;margin-bottom:8px">按2025录取分从高到低排序 · 冲稳保比例 3:4:3</p>';
  html += '<table class="school-table"><tr><th>序号</th><th>类型</th><th>学校</th><th>2025分</th><th>分差</th><th>梯队</th><th>住校</th><th>推荐理由</th></tr>';
  for(var i=0;i<calc.nkPlan.length;i++){
    var e = calc.nkPlan[i];
    var tc = e.type==='冲'?'tag-chong':e.type==='稳'?'tag-wen':'tag-bao';
    html += '<tr><td>'+e.i+'</td><td><span class="tag '+tc+'">'+e.type+'</span></td>';
    html += '<td><strong>'+e.s.n+'</strong></td><td>'+e.s.s+'分</td>';
    html += '<td>'+(e.s.diff>0?'+':'')+e.s.diff+'分</td><td>'+e.s.tn+'</td><td>'+e.s.b+'</td>';
    html += '<td style="text-align:left;font-size:0.85em">'+(e.s.a?'📍'+e.s.d:'')+(e.s.m?'🚇'+e.s.m:'')+'</td></tr>';
  }
  html += '</table>';

  // 五、AI分析
  html += '<h3>五、AI 综合分析与风险提示</h3>';
  html += '<div class="analysis-box">'+aiText+'</div>';

  html += '<h3>六、重要提醒</h3>';
  html += '<div class="risk-box"><ul>';
  html += '<li>📅 志愿填报时间：<strong>5月29日-30日</strong>（www.hzjyks.net）</li>';
  html += '<li>📝 中考时间：<strong>6月20日-21日</strong></li>';
  html += '<li>⚠ 分配生未被录取不影响裸考批次</li>';
  html += '<li>⚠ 严禁签约承诺：禁止"意向登记""预录取协议""捆绑填报"</li>';
  html += '<li>📊 2026新增：杭二高新(18班)+浙大附实验(14班)+4所县中首招主城</li>';
  html += '<li>⚖ 分配生比例提升至20.5%，裸考重高名额相应减少</li>';
  html += '</ul></div>';

  return html;
}

var ZHIPU_KEY = 'd66eba51f54e4211aed6f9af217ca122.pKK63AJ6GVVRN4xk';

async function getAIRecommendation(data, calc) {
  var prompt = '你是杭州中考志愿填报资深顾问。请为以下学生写100-200字综合分析：\n\n';
  prompt += '学生：'+(data.nickname||'考生')+'，'+data.schoolName+'\n';
  prompt += '二模'+calc.bestScore+'分'+(calc.bestRank?'(年排'+calc.bestRank+')':'')+'，预估中考'+(calc.bestScore+20)+'~'+(calc.bestScore+35)+'分\n';
  prompt += '分配生名额：总'+calc.totalQ+'名，前三'+calc.top3Q+'名\n';
  prompt += '住校：'+data.boarding;
  if(data.homeAddress) prompt += '，地址：'+data.homeAddress;
  prompt += '\n\n请分3段输出：\n1. 成绩定位总结（1句）\n2. 分配生策略建议（2句）\n3. 裸考策略+风险提示（2句）\n语气：专业务实，像老师在辅导。';

  try {
    var resp = await fetch('https://open.bigmodel.cn/api/paas/v4/chat/completions', {
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+ZHIPU_KEY},
      body:JSON.stringify({
        model:'glm-4-flash',
        messages:[
          {role:'system',content:'你是杭州中考志愿填报专家，回答专业、务实、简洁。输出纯文本，不用Markdown。'},
          {role:'user',content:prompt}
        ],
        temperature:0.6, max_tokens:500
      })
    });
    if(resp.ok){
      var r = await resp.json();
      return r.choices[0].message.content;
    }
  }catch(e){}
  return '（AI服务暂时不可用，以上为前端自动计算的数据。请参考志愿表格和风险提示自行判断。）';
}

// ==================== 主流程 ====================
async function generate() {
  var s1=document.getElementById('mock1Score').value, s2=document.getElementById('mock2Score').value;
  var sn=document.getElementById('schoolName').value;
  if((!s1&&!s2)||!sn){showError('请填写中学名称和至少一模或二模成绩');return;}

  var data = {
    nickname:document.getElementById('nickname').value||'',
    schoolName:sn,
    mock1Score:parseFloat(s1)||null,mock1Rank:document.getElementById('mock1Rank').value?parseInt(document.getElementById('mock1Rank').value):null,
    mock2Score:parseFloat(s2)||null,mock2Rank:document.getElementById('mock2Rank').value?parseInt(document.getElementById('mock2Rank').value):null,
    targets:document.getElementById('targets').value||'',
    homeAddress:document.getElementById('homeAddress').value||'',
    boarding:document.getElementById('boarding').value||'不限',
    studentCount:document.getElementById('studentCount').value?parseInt(document.getElementById('studentCount').value):null,
    grade8bScore:document.getElementById('grade8bScore').value?parseFloat(document.getElementById('grade8bScore').value):null,
    grade9aScore:document.getElementById('grade9aScore').value?parseFloat(document.getElementById('grade9aScore').value):null,
  };

  var btn=document.getElementById('submitBtn');btn.disabled=true;btn.textContent='⏳ 计算中...';
  document.getElementById('errorBox').style.display='none';
  document.getElementById('reportBox').style.display='none';
  document.getElementById('loadingBox').style.display='block';

  // 1. 前端计算
  var calc = computeAll(data);

  // 2. AI生成推荐文字
  var aiText = await getAIRecommendation(data, calc);

  // 3. 渲染报告
  document.getElementById('loadingBox').style.display='none';
  var body = document.getElementById('reportBody');
  body.innerHTML = renderReport(data, calc, aiText);
  document.getElementById('reportBox').style.display='block';
  window.scrollTo({top:document.getElementById('reportBox').offsetTop-20,behavior:'smooth'});

  btn.disabled=false;btn.textContent='🤖 重新生成方案';
}

function showError(msg){var b=document.getElementById('errorBox');b.textContent='❌ '+msg;b.style.display='block';}
